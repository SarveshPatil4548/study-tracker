{% extends "base.html" %}
{% block content %}

<!-- Header -->
<div class="flex items-center gap-3 anim-fade-in">
    <div class="w-10 h-10 rounded-lg bg-brand-50 dark:bg-brand-500/15 flex items-center justify-center">
        <svg class="w-5 h-5 text-brand-600 dark:text-brand-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
    </div>
    <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">Log a Session</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-0.5">Record what you studied and for how long.</p>
    </div>
</div>

<!-- Form Card (centered) -->
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg dark:shadow-gray-900/20 p-8 hover:shadow-xl transition-all duration-200 mt-6 max-w-xl mx-auto anim-slide-up">
    <form method="POST" enctype="multipart/form-data" class="space-y-5">
        <!-- Subject -->
        <div x-data="topicSelector()">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 flex items-center gap-1.5">
                <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" /></svg>
                Subject
            </label>
            <select name="subject_id" required x-model="selectedSubject" @change="loadTopics()"
                    class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all duration-200 bg-white dark:bg-gray-700">
                <option value="">Choose a subject...</option>
                {% for s in subjects %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>

            <!-- Topic -->
            <div x-show="topics.length > 0" x-transition class="mt-3">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 flex items-center gap-1.5">
                    <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" /></svg>
                    Topic <span class="text-gray-400 dark:text-gray-500 font-normal">(optional)</span>
                </label>
                <select name="topic_id"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all duration-200 bg-white dark:bg-gray-700">
                    <option value="">No topic</option>
                    <template x-for="t in topics" :key="t.id">
                        <option :value="t.id" x-text="t.name"></option>
                    </template>
                </select>
            </div>
        </div>

        <!-- Date & Duration Row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 flex items-center gap-1.5">
                    <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" /></svg>
                    Date
                </label>
                <input type="date" name="date" value="{{ today }}" required
                       class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all duration-200">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 flex items-center gap-1.5">
                    <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                    Duration
                </label>
                <div class="flex gap-2 items-center">
                    <input type="number" name="duration_hours" min="0" max="23" value="0" id="timer_hours"
                           class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all duration-200"
                           placeholder="0">
                    <span class="text-gray-400 dark:text-gray-500 text-sm font-medium flex-shrink-0">hrs</span>
                    <input type="number" name="duration_mins" min="0" max="59" value="0" id="timer_mins"
                           class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all duration-200"
                           placeholder="0">
                    <span class="text-gray-400 dark:text-gray-500 text-sm font-medium flex-shrink-0">min</span>
                </div>
            </div>
        </div>

        <!-- Notes -->
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 flex items-center gap-1.5">
                <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
                Notes <span class="text-gray-400 dark:text-gray-500 font-normal">(optional)</span>
            </label>
            <textarea name="notes" rows="3"
                      class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-gray-100 bg-white dark:bg-gray-700 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all duration-200 resize-none"
                      placeholder="What did you study? Any key topics or takeaways?"></textarea>
        </div>

        <!-- Attachment -->
        <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5 flex items-center gap-1.5">
                <svg class="w-4 h-4 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13" /></svg>
                Attachment <span class="text-gray-400 dark:text-gray-500 font-normal">(optional, max 5MB)</span>
            </label>
            <input type="file" name="attachment" accept=".pdf,.png,.jpg,.jpeg,.txt"
                   class="w-full text-sm text-gray-500 dark:text-gray-400 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-brand-50 dark:file:bg-brand-500/15 file:text-brand-700 dark:file:text-brand-400 hover:file:bg-brand-100 dark:hover:file:bg-brand-500/25 file:cursor-pointer file:transition-all duration-200">
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-1.5">PDF, PNG, JPG, or TXT</p>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full bg-brand-600 text-white px-8 py-3.5 rounded-xl text-sm font-semibold shadow-lg hover:bg-brand-700 hover:shadow-xl hover:scale-[1.02] transition-all duration-200 active:scale-[0.95] flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>
            Log Session
        </button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const saved = localStorage.getItem('studyTimer');
        if (saved) {
            const data = JSON.parse(saved);
            if (!data.running && data.elapsed > 0) {
                const totalMins = Math.floor(data.elapsed / 60);
                const h = Math.floor(totalMins / 60);
                const m = totalMins % 60;
                const hoursInput = document.getElementById('timer_hours');
                const minsInput = document.getElementById('timer_mins');
                if (hoursInput) hoursInput.value = h;
                if (minsInput) minsInput.value = m;
            }
        }
    });

    function topicSelector() {
        return {
            selectedSubject: '',
            topics: [],
            loadTopics() {
                if (!this.selectedSubject) { this.topics = []; return; }
                fetch('/api/topics/' + this.selectedSubject)
                    .then(res => res.json())
                    .then(data => { this.topics = data; });
            }
        }
    }
</script>

{% endblock %}
