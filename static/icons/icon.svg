<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book pages -->
  <g transform="translate(256,260)" filter="url(#glow)" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-8,-100 C-8,-100 -120,-90 -130,-80 L-130,60 C-120,52 -8,48 -8,48 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Right page -->
    <path d="M8,-100 C8,-100 120,-90 130,-80 L130,60 C120,52 8,48 8,48 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Spine -->
    <line x1="0" y1="-108" x2="0" y2="56"/>
    <!-- Left page lines -->
    <line x1="-100" y1="-50" x2="-25" y2="-55" stroke-opacity="0.5" stroke-width="6"/>
    <line x1="-100" y1="-20" x2="-25" y2="-22" stroke-opacity="0.5" stroke-width="6"/>
    <line x1="-100" y1="10" x2="-25" y2="8" stroke-opacity="0.5" stroke-width="6"/>
    <!-- Right page lines -->
    <line x1="25" y1="-55" x2="100" y2="-50" stroke-opacity="0.5" stroke-width="6"/>
    <line x1="25" y1="-22" x2="100" y2="-20" stroke-opacity="0.5" stroke-width="6"/>
    <line x1="25" y1="8" x2="100" y2="10" stroke-opacity="0.5" stroke-width="6"/>
    <!-- Bookmark -->
    <path d="M60,-100 L60,-130 L72,-118 L84,-130 L84,-100" fill="#f59e0b" stroke="#f59e0b" stroke-width="4"/>
  </g>
  <!-- Small "ST" text below book -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="700" fill="white" opacity="0.9">ST</text>
</svg>
