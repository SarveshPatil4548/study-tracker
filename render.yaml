services:
  - type: web
    name: study-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: study-tracker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: study-tracker-db
    plan: free
    databaseName: study_tracker
